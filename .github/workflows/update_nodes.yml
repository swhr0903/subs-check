name: Manual Proxy Update

on:
  workflow_dispatch: # 手动触发

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install and Run
        run: |
          # 1. 确保安装脚本有执行权限并运行它
          # 如果脚本名不是 install.sh，请修改下面这一行
          chmod +x install.sh
          ./install.sh || echo "Install script finished"

          # 2. 这里的关键：subs-check 安装后通常在根目录或 bin 下
          # 我们尝试在当前目录编译并运行，确保能读到仓库里的 config 文件夹
          go mod tidy
          go build -ldflags "-X main.Version=1.0.0" -o subs-check-bin .
          
          # 3. 运行程序，程序会自动读取当前目录下的 config/config.yaml
          # 并默认在 output/ 目录下生成文件
          mkdir -p output
          ./subs-check-bin || echo "Execution finished"
          
          # 4. 调试：看看到底生成了什么文件
          echo "--- Files in output directory ---"
          ls -R output/

      - name: Upload to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 寻找 output 目录下大小超过 100 字节的第一个非隐藏文件
          RESULT_FILE=$(find output -type f -size +100c | head -n 1)

          if [ -z "$RESULT_FILE" ]; then
            echo "Error: No valid node file found in output/ directory."
            exit 1
          fi

          echo "Found result file: $RESULT_FILE"
          NODES=$(cat "$RESULT_FILE")

          # 执行上传
          curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_KV_NAMESPACE_ID/values/all_nodes" \
               -H "Authorization: Bearer $CF_API_TOKEN" \
               -H "Content-Type: text/plain" \
               --data "$NODES"
          
          echo "Successfully uploaded to Cloudflare KV!"
