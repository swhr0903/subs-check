name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Setup
        run: |
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          # 建立双重配置路径，防止程序找不到 config.yaml
          mkdir -p config
          if [ -d "config" ] && [ -f "config/config.yaml" ]; then
            cp config/config.yaml ./config.yaml || true
          fi

      - name: Run Filter and Upload
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 1. 第一次运行：完成初始化
          echo ">>> 正在执行初始化阶段..."
          ./subs-check-bin || echo "Init process finished"
          sleep 5

          # 2. 第二次运行：后台执行正式筛选
          echo ">>> 启动正式筛选任务 (后台模式)..."
          ./subs-check-bin > run.log 2>&1 &
          
          # 3. 监控 output/base64.txt 是否生成
          echo ">>> 监控文件生成中..."
          for i in {1..150}; do
            # 检查文件是否存在且大小大于 1000 字节
            if [ -f "output/base64.txt" ] && [ $(stat -c%s "output/base64.txt") -gt 1000 ]; then
              echo "✅ 检测到节点文件生成成功，准备同步到 Cloudflare..."
              
              # 执行上传 (使用二进制流上传，最稳)
              curl -s -v -m 60 --connect-timeout 20 \
                -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: text/plain" \
                --data-binary @output/base64.txt
              
              echo -e "\n🎉 同步完成，任务结束。"
              exit 0
            fi
            
            sleep 20
            # 打印最后一行日志防止控制台超时
            tail -n 1 run.log || true
          done

          echo "❌ 失败：在 50 分钟内未生成节点文件。"
          exit 1
