name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    # 将整个 Job 的超时提升到 60 分钟，确保大批量节点能跑完
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Run
        run: |
          # 1. 编译
          go mod tidy
          go build -o subs-check .
          chmod +x ./subs-check

          # 2. 准备输出目录
          mkdir -p output

          # 3. 运行筛选任务
          echo "开始筛选任务（针对大量节点已延长超时时间）..."
          # 将 timeout 延长至 45 分钟 (2700s)，预留足够的时间给 1468 个节点
          timeout 2700s ./subs-check || echo "程序运行结束（可能是正常完成或达到45分钟上限）"

          # 4. 调试：看看生成了什么，特别是 output 文件夹
          echo "--- 检查 output 目录内容 ---"
          ls -R output/
          echo "--- 检查当前目录所有新生成文件 ---"
          find . -maxdepth 2 -not -path '*/.*' -size +100c

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          echo "--- 定位节点文件 ---"
          
          # 优先找 output 目录，如果为空则全盘扫描 .txt 或 .yaml
          RESULT_FILE=$(find output -type f -size +100c | head -n 1)
          if [ -z "$RESULT_FILE" ]; then
            RESULT_FILE=$(find . -maxdepth 2 -name "*.txt" -size +100c ! -name "README.md" | head -n 1)
          fi

          if [ -z "$RESULT_FILE" ]; then
            echo "错误：依然未能生成任何有效的节点文件！"
            echo "提示：请检查 config.yaml 中是否配置了本地保存(save local)。"
            exit 1
          fi

          echo "找到结果文件: $RESULT_FILE"
          NODES=$(cat "$RESULT_FILE")

          echo "正在上传到 Cloudflare..."
          curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_KV_NAMESPACE_ID/values/all_nodes" \
               -H "Authorization: Bearer $CF_API_TOKEN" \
               -H "Content-Type: text/plain" \
               --data "$NODES"
          
          echo "上传成功！"
