name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Run
        run: |
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          
          # 运行筛选逻辑
          ./subs-check-bin || true
          mkdir -p output
          ./subs-check-bin || true
          
          # 打印内容到日志，方便你直接看
          if [ -f "output/base64.txt" ]; then
            echo "=== 节点文件内容预览 ==="
            cat output/base64.txt
            echo -e "\n=== 预览结束 ==="
          fi

      # 【新增步骤】将 output 目录打包，供你在 GitHub 页面下载
      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-output-file
          path: output/base64.txt
          retention-days: 1 # 仅保留1天，节省空间

      - name: Upload to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          echo "🚀 正在同步到 Cloudflare..."
          curl -v -m 60 --connect-timeout 20 \
            -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary @output/base64.txt
