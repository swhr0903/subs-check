name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Run
        run: |
          # 1. 编译
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          
          # 2. 初始化与运行 (运行两次以确保生成文件)
          ./subs-check-bin || true
          mkdir -p output
          ./subs-check-bin || true
          
          # 3. 验证文件是否存在
          if [ -f "output/base64.txt" ]; then
            echo "✅ 成功生成文件: output/base64.txt"
            ls -lh output/base64.txt
          else
            echo "❌ 错误：output/base64.txt 未生成！"
            ls -R
            exit 1
          fi

      - name: Upload to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          echo "🚀 正在上传 output/base64.txt 到 Cloudflare..."
          
          # 直接指定路径，不使用 find，不使用中间变量
          # -v: 开启详细日志，方便查看连接过程
          # --data-binary @path: 直接流式传输文件内容
          curl -v -m 60 --connect-timeout 20 \
            -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary @output/base64.txt

          echo -e "\n🎉 上传流程结束。"
