name: Manual Proxy Update

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Step 1: 模拟安装过程
        run: |
          # 1. 给安装脚本权限并执行 (假设脚本叫 install.sh)
          # 注意：因为 sudo 会尝试开启服务，Action 环境没 systemd，我们忽略报错
          chmod +x install.sh
          sudo ./install.sh || echo "安装脚本运行结束（忽略服务启动失败）"
          
          # 2. 补齐安装脚本可能没创建的目录
          sudo mkdir -p /opt/subs-check/output
          sudo mkdir -p /opt/subs-check/config
          
          # 3. 将仓库里的配置文件覆盖到安装目录（确保程序有源可扫）
          if [ -d "config" ]; then
            sudo cp -r config/* /opt/subs-check/config/
          fi

      - name: Step 2: 运行筛选程序
        run: |
          cd /opt/subs-check
          # 运行安装好的二进制文件
          # 加上 timeout 防止程序测速太慢导致不停止
          sudo timeout 300s ./subs-check || echo "程序运行结束"
          
          # 检查结果到底在哪
          echo "--- 调试：查看安装目录下的文件变动 ---"
          ls -R /opt/subs-check/

      - name: Step 3: 上传到 Cloudflare KV
        run: |
          echo "--- 正在从安装目录提取结果 ---"
          
          # 在安装后的目录里寻找最新生成的节点文件
          # 排除程序本身、脚本和配置文件
          RESULT_FILE=$(find /opt/subs-check -type f \
            ! -name "subs-check" \
            ! -name "*.sh" \
            ! -name "*.yaml" \
            ! -name "*.yml" \
            ! -name "*.service" \
            -size +100c | xargs ls -t | head -n 1)

          if [ -z "$RESULT_FILE" ]; then
            echo "失败：安装目录下未找到生成的节点文件！"
            exit 1
          fi

          echo "定位到目标文件: $RESULT_FILE"
          NODES=$(cat "$RESULT_FILE")

          echo "正在上传到 Cloudflare KV..."
          curl -v -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/all_nodes" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: text/plain" \
               --data "$NODES"
