name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build and Force Config
        run: |
          # 1. 编译
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          
          # 2. 获取当前绝对路径
          WORKSPACE=$(pwd)
          echo "Current Workspace: $WORKSPACE"
          
          # 3. 强制清理并重建配置目录
          rm -rf config
          mkdir -p config
          
          # 4. 寻找并拷贝配置文件（无论它在根目录还是 config 目录）
          if [ -f "config.yaml" ]; then
            cp config.yaml config/config.yaml
          elif [ -f "config/config.yaml" ]; then
            # 如果原本就在 config/ 下，先移出来再拷进去确保刷新
            cp config/config.yaml ./temp_config.yaml
            cp ./temp_config.yaml config/config.yaml
          fi
          
          # 5. 验证配置文件确实存在于程序预期的位置
          if [ -f "$WORKSPACE/config/config.yaml" ]; then
            echo "✅ 配置文件已锁定: $WORKSPACE/config/config.yaml"
            # 打印前几行（隐藏敏感信息）确认文件内容不是空的
            head -n 5 config/config.yaml
          else
            echo "❌ 严重错误：未能准备好配置文件"
            exit 1
          fi

      - name: Execute Filter
        run: |
          # 运行程序
          # 此时程序会读取 ./config/config.yaml
          # 运行完成后，你修改过的 main.go 会检测到文件并 exit 0
          ./subs-check-bin

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 检查 output/base64.txt 是否生成
          if [ -f "output/base64.txt" ]; then
            echo "🚀 发现节点文件，开始上传到 KV..."
            
            curl -v -m 60 --connect-timeout 20 \
              -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-binary @output/base64.txt
              
            echo -e "\n🎉 KV 同步完成！"
          else
            echo "❌ 错误：output/base64.txt 未生成，请检查程序日志。"
            # 列出目录结构方便调试
            ls -R
            exit 1
          fi

      - name: Archive Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            output/
            config/
            *.log
