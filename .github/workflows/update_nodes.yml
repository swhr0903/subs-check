name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Run
        run: |
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          # 第一次運行初始化
          ./subs-check-bin || true
          mkdir -p output
          # 第二次運行篩選
          ./subs-check-bin || true
          echo "--- 檢查 output 目錄 ---"
          ls -lh output/

      - name: Upload to Cloudflare (Debug Mode)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 1. 定位文件
          RESULT_FILE=$(find output -type f -size +1k | head -n 1)
          if [ -z "$RESULT_FILE" ]; then
            echo "❌ [錯誤] 未找到結果文件，請檢查上面步驟的輸出。"
            exit 1
          fi

          echo "🚀 [開始上傳] 文件路徑: $RESULT_FILE"
          echo "📏 文件大小: $(du -h "$RESULT_FILE" | cut -f1)"

          # 2. 執行上傳 (去掉 -s，增加詳細日誌)
          # --connect-timeout 15: 連接超時 15 秒
          # -m 30: 整個請求超時 30 秒
          # -v: 顯示詳細的傳輸過程 (Verbose)
          
          curl -v -m 30 --connect-timeout 15 \
            -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_KV_NAMESPACE_ID/values/all_nodes" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @"$RESULT_FILE"

          echo -e "\n✅ [流程結束] 如果上面沒有報錯，請檢查 KV 數據。"
