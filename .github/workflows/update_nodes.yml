name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Run
        run: |
          # 1. 编译
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          
          # 2. 第一次运行初始化（你提到的必须执行两次）
          ./subs-check-bin || echo "Init done"
          
          # 3. 第二次运行正式筛选
          # 我们给程序设置一个 40 分钟的硬性执行时间，时间一到强制停止
          # 这样它生成完文件后，即使进入 Web 循环也会被 timeout 掐断
          timeout 40m ./subs-check-bin || echo "程序运行时间到或已完成"

      - name: Upload to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 检查文件是否存在
          if [ -f "output/base64.txt" ]; then
            echo "✅ 找到文件，准备上传..."
            # 直接上传，不带变量，不带复杂逻辑
            curl -v -m 60 --connect-timeout 20 \
              -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-binary @output/base64.txt
          else
            echo "❌ 错误：output/base64.txt 未生成！"
            ls -R
            exit 1
          fi
