name: Manual Proxy Update

on:
  workflow_dispatch: # 删掉了 schedule 定时，改为纯手动触发，防止自动扣费

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    # 设置超时时间为 10 分钟，防止程序卡死偷跑配额
    timeout-minutes: 10 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build and Run
        run: |
          mkdir -p output
          go mod tidy
          
          # 仅尝试一次带参数的编译
          go build -ldflags "-X main.Version=1.0.0 -X main.CurrentCommit=gh-actions" -o proxy_tool .
          
          # 运行程序，如果 5 分钟没出结果直接杀掉
          timeout 300s ./proxy_tool || echo "程序运行超时或失败"

      - name: Upload to CF
        if: success() # 只有上面成功了才执行上传
        run: |
          RESULT_FILE=$(find output -type f -not -path '*/.*' | head -n 1)
          if [ -n "$RESULT_FILE" ]; then
            NODES=$(cat "$RESULT_FILE")
            curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/all_nodes" \
                 -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                 -H "Content-Type: text/plain" \
                 --data "$NODES"
          fi
