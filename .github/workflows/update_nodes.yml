name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Setup
        run: |
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          # 确保配置文件夹存在，并拷贝配置
          mkdir -p config
          [ -f "config/config.yaml" ] && cp config/config.yaml ./config.yaml || true

      - name: Run Filter (With Hard Timeout)
        run: |
          # 第一次运行：初始化（如果需要）
          ./subs-check-bin || echo "Init stage finished"
          
          # 第二次运行：正式筛选
          # 使用 timeout 45m。程序跑完后会卡住，45分钟后 timeout 会杀掉它并继续下一步
          echo ">>> 开始测速筛选，预计运行 45 分钟..."
          timeout 45m ./subs-check-bin || echo "Reach timeout or finished"

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 运行到这里时，程序已经被 timeout 杀掉了
          if [ -f "output/base64.txt" ]; then
            echo "✅ 发现生成文件，开始上传..."
            curl -v -m 60 --connect-timeout 20 \
              -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-binary @output/base64.txt
            echo "🎉 同步完成！"
          else
            echo "❌ 错误：未在 output 目录下找到 base64.txt"
            ls -R
            exit 1
          fi
