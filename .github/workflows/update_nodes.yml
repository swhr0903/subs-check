name: Manual Proxy Update

on:
  workflow_dispatch: # 手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build and Run Go App
        run: |
          # 1. 准备环境
          mkdir -p output
          go mod tidy
          
          # 2. 编译项目 (针对 subs-check 特色注入变量)
          go build -ldflags "-X main.Version=1.0.0 -X main.CurrentCommit=$(date +%Y%m%d)" -o proxy_tool .
          
          # 3. 执行程序 (限时5分钟)
          # 注意：请确保你的仓库里有 config 文件夹及其 yaml 配置文件
          chmod +x ./proxy_tool
          ./proxy_tool || echo "程序运行可能未生成文件"
          
          # 4. 打印目录，确认文件到底生成在哪了
          echo "--- 调试：列出 output 目录内容 ---"
          ls -R output/

      - name: Upload Result to Cloudflare KV
        run: |
          echo "--- 正在定位真正的节点文件 ---"
          
          # 严格限制：只在 output 文件夹寻找，且排除 .sh, .go 等非节点文件
          RESULT_FILE=$(find output -type f \
            ! -name "*.sh" \
            ! -name "*.go" \
            ! -name "*.yaml" \
            ! -name "*.yml" \
            | head -n 1)

          if [ -z "$RESULT_FILE" ]; then
            echo "失败：在 output 文件夹内没找到任何节点文件！"
            echo "可能是程序没跑成功，或者是 config 里的路径配置不对。"
            exit 1
          fi

          echo "定位到目标文件: $RESULT_FILE"
          NODES=$(cat "$RESULT_FILE")

          if [[ "$NODES" == *"#!"* ]]; then
            echo "检测到上传内容疑似脚本，已拦截！"
            exit 1
          fi

          echo "正在上传到 Cloudflare KV..."
          curl -v -X PUT "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/all_nodes" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: text/plain" \
               --data "$NODES"
