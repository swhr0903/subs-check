name: Scheduled Proxy Update

on:
  workflow_dispatch: # 保留手动触发按钮
  schedule:
    # 北京时间每天 08:00 和 20:00 执行 (对应 UTC 0:00 和 12:00)
    - cron: '0 0,12 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          # --- 核心修复：移除 cache 避免 tar 解压冲突 ---
          cache: false 

      - name: Build and Setup
        run: |
          # 1. 编译 (关闭缓存后会重新下载依赖，虽然慢几十秒但最稳)
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          
          # 2. 准备配置目录
          mkdir -p config
          mkdir -p output
          
          # 3. 搜索并放置配置文件
          REAL_CONFIG=$(find . -name "config.yaml" | head -n 1)
          if [ -n "$REAL_CONFIG" ]; then
            cp "$REAL_CONFIG" config/config.yaml
            echo "✅ 使用配置文件: $REAL_CONFIG"
          else
            echo "❌ 未找到 config.yaml"
            exit 1
          fi

      - name: Execute Filter
        run: |
          # 运行你修改过 main.go 的程序
          ./subs-check-bin

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          if [ -s "output/base64.txt" ]; then
            echo "🚀 节点生成成功 (大小: $(stat -c%s output/base64.txt) 字节)，开始同步..."
            
            # 使用 -s 保持静默，-S 显示错误，减少日志冗余
            curl -sS -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-binary @output/base64.txt
              
            echo -e "\n🎉 同步完成！"
          else
            echo "⚠️ 警告：output/base64.txt 为空或不存在，跳过上传。"
            exit 1
          fi
