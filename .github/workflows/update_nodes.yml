name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Compile and Run App
        run: |
          # 1. 整理依赖
          go mod tidy
          
          # 2. 编译程序 (注入 Version 变量防止报错)
          # 注意：这里直接编译当前目录
          go build -ldflags "-X main.Version=1.0.0 -X main.CurrentCommit=$(date +%Y%m%d)" -o subs-check-app .
          
          # 3. 准备输出目录
          mkdir -p output
          
          # 4. 运行程序
          # 确保仓库根目录下有 config/config.yaml 文件
          chmod +x ./subs-check-app
          ./subs-check-app || echo "程序运行结束"
          
          # 5. 调试：确认生成了什么
          echo "--- 检查 output 目录 ---"
          ls -R output/

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          # 寻找 output 目录下生成的节点文件
          # 排除隐藏文件和文件夹
          RESULT_FILE=$(find output -type f -not -path '*/.*' -size +100c | head -n 1)

          if [ -z "$RESULT_FILE" ]; then
            echo "错误：output 目录下未找到任何有效的节点文件！"
            echo "当前目录结构如下："
            ls -R
            exit 1
          fi

          echo "找到目标文件: $RESULT_FILE"
          NODES=$(cat "$RESULT_FILE")

          echo "正在上传到 Cloudflare..."
          # 使用 -w 打印状态码，-s 静默
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_KV_NAMESPACE_ID/values/all_nodes" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: text/plain" \
            --data "$NODES")

          if [ "$RESPONSE" == "200" ]; then
            echo "上传成功！状态码: 200"
          else
            echo "上传失败！状态码: $RESPONSE"
            exit 1
          fi
