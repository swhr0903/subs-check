name: Manual Proxy Update

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build and Locate Config
        run: |
          # 1. 编译
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          
          # 2. 准备配置目录
          mkdir -p config
          
          # 3. 全盘搜索 config.yaml 或 config.example.yaml
          echo "🔍 正在仓库中寻找配置文件..."
          # 优先找真正的 config.yaml
          REAL_CONFIG=$(find . -name "config.yaml" | head -n 1)
          
          if [ -n "$REAL_CONFIG" ]; then
            echo "✅ 找到配置文件: $REAL_CONFIG"
            cp "$REAL_CONFIG" config/config.yaml
          else
            echo "⚠️ 未找到 config.yaml，尝试查找 example 文件..."
            EXAMPLE_CONFIG=$(find . -name "config.example.yaml" | head -n 1)
            if [ -n "$EXAMPLE_CONFIG" ]; then
              echo "✅ 使用示例文件作为配置: $EXAMPLE_CONFIG"
              cp "$EXAMPLE_CONFIG" config/config.yaml
            else
              echo "❌ 严重错误：仓库中没有任何 .yaml 配置文件！"
              ls -R
              exit 1
            fi
          fi
          
          # 4. 最终验证
          if [ -f "config/config.yaml" ]; then
            echo "🚀 配置文件准备就绪，路径: $(pwd)/config/config.yaml"
          else
            exit 1
          fi

      - name: Execute Filter
        run: |
          # 运行程序
          # 此时它会读取 ./config/config.yaml
          # 运行完成后，你修改过的 main.go 会检测到文件并 exit 0
          ./subs-check-bin

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          if [ -f "output/base64.txt" ]; then
            echo "🚀 发现节点文件，开始上传..."
            curl -v -m 60 --connect-timeout 20 \
              -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-binary @output/base64.txt
          else
            echo "❌ 错误：output/base64.txt 未生成"
            ls -R
            exit 1
          fi
