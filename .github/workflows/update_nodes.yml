name: Scheduled Proxy Update

on:
  workflow_dispatch: # 保留手动触发，方便调试
  schedule:
    # 每 12 小时执行一次 (UTC 时间 0:00 和 12:00)
    # 对应北京时间 8:00 和 20:00
    - cron: '0 */12 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    # 设置超时，防止程序卡死消耗 GitHub 额度
    timeout-minutes: 50 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true # 开启缓存，加快构建速度，节省 Action 时间

      - name: Build and Locate Config
        run: |
          go mod tidy
          go build -o subs-check-bin .
          chmod +x ./subs-check-bin
          mkdir -p config
          # 自动寻找配置逻辑保持不变
          REAL_CONFIG=$(find . -name "config.yaml" | head -n 1)
          if [ -n "$REAL_CONFIG" ]; then
            cp "$REAL_CONFIG" config/config.yaml
          fi

      - name: Execute Filter
        run: |
          # 确保你已经使用了之前修改过的带 os.Exit(0) 的 main.go
          ./subs-check-bin

      - name: Upload Result to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          if [ -f "output/base64.txt" ]; then
            # 只有当文件存在且不为空时才上传，节省 KV 写入次数
            [ -s "output/base64.txt" ] || exit 1
            
            curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/all_nodes" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: text/plain" \
              --data-binary @output/base64.txt
          fi
